name: CI Pipeline

on:
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/ravindranathsingh/backend-app
  IMAGE_FRONTEND: ghcr.io/ravindranathsingh/frontend-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  helm-validation:
    name: Helm Lint + Template Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm/

      - name: Helm Template Render
        run: helm template python-app helm/

  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: helm-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u "${{ secrets.GHCR_USERNAME }}" \
            --password-stdin

      - name: Build Backend Image
        run: docker build -t ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }} ./app/backend

      - name: Tag Latest
        run: docker tag ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_BACKEND }}:latest

      - name: Push Backend Image
        run: |
          docker push ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_BACKEND }}:latest

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: helm-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
            -u "${{ secrets.GHCR_USERNAME }}" \
            --password-stdin

      - name: Build Frontend Image
        run: docker build -t ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }} ./app/frontend

      - name: Tag Latest
        run: docker tag ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_FRONTEND }}:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_FRONTEND }}:latest

  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_FRONTEND }}:${{ env.IMAGE_TAG }}